---
# Nginx Configuration
nginx_worker_processes: auto
nginx_worker_connections: 1024
nginx_client_max_body_size: 100M
nginx_keepalive_timeout: 65

# GoAccess Configuration (built-in, cannot be disabled)
goaccess_enabled: true
goaccess_stats_path: /var/www/html/stats.html
goaccess_ws_port: 7890
goaccess_admin_user: admin
goaccess_admin_password: changeme  # REQUIRED: Override this in your playbook

# MaxMind GeoIP Configuration
maxmind_account_id: ""  # REQUIRED: Your MaxMind Account ID
maxmind_license_key: ""  # REQUIRED: Your MaxMind License Key

# Domain for WebSocket URL
domain: localhost  # REQUIRED: Set to your actual domain


# Certbot SSL Configuration
certbot_enabled: true  # 是否啟用 SSL 憑證自動申請
certbot_email: ""  # REQUIRED: Let's Encrypt 聯絡信箱
certbot_webroot_path: /var/www/certbot  # ACME 驗證檔案路徑
