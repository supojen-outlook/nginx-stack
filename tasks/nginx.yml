---
- name: 更新 apt 缓存并安装 Nginx（Debian/Ubuntu）
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  notify: Restart nginx
  when: ansible_facts['os_family'] == "Debian"

- name: 安装 Nginx（Red Hat/CentOS）
  ansible.builtin.dnf:
    name: nginx
    state: present
  notify: Restart nginx
  when: ansible_facts['os_family'] == "RedHat"

- name: 创建 nginx 配置目录
  ansible.builtin.file:
    path: /etc/nginx/conf.d
    state: directory
    mode: '0755'

- name: 部署 nginx 主配置
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  notify: Reload nginx

- name: 部署 conf.d 配置
  ansible.builtin.copy:
    src: "conf.d/{{ item }}"
    dest: "/etc/nginx/conf.d/{{ item }}"
    mode: '0644'
  loop:
    - 00-letsencrypt.conf
    - ssl-params.conf
  notify: Reload nginx

- name: 启动并启用 Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
