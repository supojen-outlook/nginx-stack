---
# --------------------------------------------------------
# 步驟 1：安裝 Nginx（Debian/Ubuntu）
# --------------------------------------------------------
- name: Update apt cache and install Nginx (Debian/Ubuntu)
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
  notify: Restart nginx
  when: ansible_facts['os_family'] == "Debian"

# --------------------------------------------------------
# 步驟 2：安裝 Nginx（Red Hat/CentOS）
# --------------------------------------------------------
- name: Install Nginx (Red Hat/CentOS)
  ansible.builtin.dnf:
    name: nginx
    state: present
  notify: Restart nginx
  when: ansible_facts['os_family'] == "RedHat"

# --------------------------------------------------------
# 步驟 3：建立 Nginx 設定目錄
# --------------------------------------------------------
- name: Create nginx config directory
  ansible.builtin.file:
    path: /etc/nginx/conf.d
    state: directory
    mode: '0755'

# --------------------------------------------------------
# 步驟 4：部署 Nginx 主設定檔
# --------------------------------------------------------
- name: Deploy nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  notify: Reload nginx

# --------------------------------------------------------
# 步驟 5：部署 conf.d 設定檔
# --------------------------------------------------------
- name: Deploy conf.d configurations
  ansible.builtin.copy:
    src: "conf.d/{{ item }}"
    dest: "/etc/nginx/conf.d/{{ item }}"
    mode: '0644'
  loop:
    - 00-letsencrypt.conf
    - ssl-params.conf
  notify: Reload nginx

# --------------------------------------------------------
# 步驟 6：啟動並啟用 Nginx 服務
# --------------------------------------------------------
- name: Start and enable Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

# ============================================
# Certbot SSL Certificate Configuration
# ============================================

# --------------------------------------------------------
# 步驟 7：安裝 Certbot（Debian/Ubuntu）
# --------------------------------------------------------
- name: Install Certbot (Debian/Ubuntu)
  ansible.builtin.apt:
    name: certbot
    state: present
  when:
    - ansible_facts['os_family'] == "Debian"
    - certbot_enabled | bool

# --------------------------------------------------------
# 步驟 8：安裝 Certbot（Red Hat/CentOS）
# --------------------------------------------------------
- name: Install Certbot (Red Hat/CentOS)
  ansible.builtin.dnf:
    name: certbot
    state: present
  when:
    - ansible_facts['os_family'] == "RedHat"
    - certbot_enabled | bool

# --------------------------------------------------------
# 步驟 9：建立 Certbot webroot 目錄
# --------------------------------------------------------
- name: Create certbot webroot directory
  ansible.builtin.file:
    path: "{{ certbot_webroot_path }}"
    state: directory
    mode: '0755'
  when: certbot_enabled | bool

# --------------------------------------------------------
# 步驟 10：檢查 SSL 憑證是否已存在
# --------------------------------------------------------
- name: Check if SSL certificate already exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  register: cert_exists
  when: certbot_enabled | bool

# --------------------------------------------------------
# 步驟 11：申請 SSL 憑證（webroot 模式）
# --------------------------------------------------------
- name: Request SSL certificate (webroot mode)
  ansible.builtin.command: >
    certbot certonly --webroot
    -w {{ certbot_webroot_path }}
    -d {{ domain }}
    --agree-tos
    --non-interactive
    --email {{ certbot_email }}
  args:
    creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  when:
    - certbot_enabled | bool
    - certbot_email | length > 0
  register: certbot_result

# --------------------------------------------------------
# 步驟 12：部署虛擬主機設定（啟用 SSL）
# --------------------------------------------------------
- name: Deploy virtual host configuration (with SSL)
  ansible.builtin.template:
    src: domain-ssl.conf.j2
    dest: "/etc/nginx/conf.d/{{ domain }}.conf"
    mode: '0644'
  when:
    - certbot_enabled | bool
    - certbot_result.changed | default(false)
  notify: Reload nginx

# --------------------------------------------------------
# 步驟 13：設定憑證自動續期 Cron
# --------------------------------------------------------
- name: Setup certificate auto-renewal cron
  ansible.builtin.cron:
    name: "Certbot auto renewal"
    minute: "0"
    hour: "3"
    job: "certbot renew --quiet --deploy-hook 'systemctl reload nginx'"
  when: certbot_enabled | bool

# ============================================
# GoAccess Installation & Configuration
# ============================================

# --------------------------------------------------------
# 步驟 14：安裝 python3-passlib（htpasswd 模組需求）
# --------------------------------------------------------
- name: Install python3-passlib (htpasswd module requirement)
  ansible.builtin.apt:
    name: python3-passlib
    state: present
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

# --------------------------------------------------------
# 步驟 15：新增 GoAccess GPG 金鑰
# --------------------------------------------------------
- name: Add GoAccess GPG key (Debian/Ubuntu)
  ansible.builtin.apt_key:
    url: https://deb.goaccess.io/gnugpg.key
    keyring: /usr/share/keyrings/goaccess.gpg
    state: present
  when: ansible_facts['os_family'] == "Debian"

# --------------------------------------------------------
# 步驟 16：新增 GoAccess APT 儲存庫
# --------------------------------------------------------
- name: Add GoAccess APT repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/goaccess.gpg] https://deb.goaccess.io/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    filename: goaccess
  when: ansible_facts['os_family'] == "Debian"

# --------------------------------------------------------
# 步驟 17：安裝 GoAccess（Debian/Ubuntu）
# --------------------------------------------------------
- name: Install GoAccess (Debian/Ubuntu)
  ansible.builtin.apt:
    name: goaccess
    state: present
    update_cache: true
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

# --------------------------------------------------------
# 步驟 18：安裝 EPEL（Red Hat/CentOS）
# --------------------------------------------------------
- name: Install EPEL (Red Hat/CentOS)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_facts['os_family'] == "RedHat"

# --------------------------------------------------------
# 步驟 19：安裝 GoAccess（Red Hat/CentOS）
# --------------------------------------------------------
- name: Install GoAccess (Red Hat/CentOS)
  ansible.builtin.dnf:
    name: goaccess
    state: present
  when: ansible_facts['os_family'] == "RedHat"

# ============================================
# GeoIP Installation & Configuration
# ============================================

# --------------------------------------------------------
# 步驟 20：安裝 geoipupdate（MaxMind 官方工具）
# --------------------------------------------------------
- name: Install geoipupdate (MaxMind official tool)
  ansible.builtin.apt:
    name: geoipupdate
    state: present
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

# --------------------------------------------------------
# 步驟 21：安裝 libmaxminddb0（GoAccess GeoIP 依賴）
# --------------------------------------------------------
- name: Install libmaxminddb0 (GoAccess GeoIP dependency)
  ansible.builtin.apt:
    name: libmaxminddb0
    state: present
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

# --------------------------------------------------------
# 步驟 22：建立 GeoIP 資料庫目錄
# --------------------------------------------------------
- name: Create GeoIP database directory
  ansible.builtin.file:
    path: /var/lib/GeoIP
    state: directory
    mode: '0755'

# --------------------------------------------------------
# 步驟 23：部署 GeoIP 設定檔
# --------------------------------------------------------
- name: Deploy GeoIP configuration
  ansible.builtin.template:
    src: GeoIP.conf.j2
    dest: /etc/GeoIP.conf
    mode: '0640'

# --------------------------------------------------------
# 步驟 24：執行初始 GeoIP 資料庫下載
# --------------------------------------------------------
- name: Run initial GeoIP database download
  ansible.builtin.command: geoipupdate
  args:
    creates: /var/lib/GeoIP/GeoLite2-City.mmdb

# --------------------------------------------------------
# 步驟 25：設定每週 GeoIP 資料庫自動更新
# --------------------------------------------------------
- name: Set up weekly GeoIP database auto-update
  ansible.builtin.cron:
    name: "MaxMind GeoIP auto update"
    minute: "0"
    hour: "3"
    weekday: "1"
    job: "geoipupdate && systemctl restart goaccess"
    user: root

# --------------------------------------------------------
# 步驟 26：建立 GoAccess 統計目錄
# --------------------------------------------------------
- name: Create GoAccess stats directory
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    owner: root
    group: root
    mode: '0755'

# --------------------------------------------------------
# 步驟 27：建立 Nginx htpasswd 驗證檔
# --------------------------------------------------------
- name: Create Nginx htpasswd file
  community.general.htpasswd:
    path: /etc/nginx/.htpasswd
    name: "{{ goaccess_admin_user }}"
    password: "{{ goaccess_admin_password }}"
    owner: root
    group: www-data
    mode: '0640'

# --------------------------------------------------------
# 步驟 28：部署 GoAccess 包裝腳本
# --------------------------------------------------------
- name: Deploy GoAccess wrapper script
  ansible.builtin.template:
    src: goaccess-wrapper.sh.j2
    dest: /usr/local/bin/goaccess-wrapper.sh
    mode: '0755'

# --------------------------------------------------------
# 步驟 29：部署 GoAccess Systemd 服務
# --------------------------------------------------------
- name: Deploy GoAccess Systemd Service
  ansible.builtin.template:
    src: goaccess.service.j2
    dest: /etc/systemd/system/goaccess.service
    mode: '0644'

# --------------------------------------------------------
# 步驟 30：重新載入 Systemd
# --------------------------------------------------------
- name: Reload Systemd
  ansible.builtin.systemd:
    daemon_reload: true

# --------------------------------------------------------
# 步驟 31：啟動並啟用 GoAccess 服務
# --------------------------------------------------------
- name: Start and enable GoAccess
  ansible.builtin.systemd:
    name: goaccess
    state: started
    enabled: true

# ============================================
# CrowdSec Installation & Configuration
# ============================================

# --------------------------------------------------------
# 步驟 32：安裝 CrowdSec 及相關元件
# --------------------------------------------------------
- name: Install CrowdSec
  when: crowdsec_enabled | bool
  block:
    - name: Install dependencies (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - nftables
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Install dependencies (Red Hat/CentOS)
      ansible.builtin.dnf:
        name:
          - curl
          - gnupg
          - nftables
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Download CrowdSec install script
      ansible.builtin.get_url:
        url: https://install.crowdsec.net
        dest: /tmp/crowdsec_install.sh
        mode: '0755'
      when: ansible_facts['os_family'] == "Debian"

    - name: Execute CrowdSec install script
      ansible.builtin.command: /tmp/crowdsec_install.sh
      args:
        creates: /etc/apt/sources.list.d/crowdsec.list
      when: ansible_facts['os_family'] == "Debian"

    - name: Install CrowdSec engine (Debian/Ubuntu)
      ansible.builtin.apt:
        name: crowdsec
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Install CrowdSec engine (Red Hat/CentOS)
      ansible.builtin.dnf:
        name: crowdsec
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install Firewall Bouncer (nftables) (Debian)
      ansible.builtin.apt:
        name: crowdsec-firewall-bouncer-nftables
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Firewall Bouncer (nftables) (Red Hat)
      ansible.builtin.dnf:
        name: crowdsec-firewall-bouncer-nftables
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install required collections
      ansible.builtin.command: cscli collections install {{ item }}
      loop:
        - crowdsecurity/nginx
        - crowdsecurity/linux
      register: crowdsec_cscli_collections
      changed_when: "'already installed' not in crowdsec_cscli_collections.stdout"

    - name: Install Discord notification plugin
      ansible.builtin.command: cscli notifications install discord
      when: crowdsec_notifications_enabled | bool
      register: crowdsec_cscli_discord
      changed_when: "'already installed' not in crowdsec_cscli_discord.stdout"

    - name: Deploy log acquisition config
      ansible.builtin.template:
        src: acquis.yaml.j2
        dest: /etc/crowdsec/acquis.yaml
        mode: '0644'
      notify: Reload crowdsec

    - name: Deploy notification config
      ansible.builtin.template:
        src: profiles.yaml.j2
        dest: /etc/crowdsec/profiles.yaml
        mode: '0644'
      when: crowdsec_notifications_enabled | bool
      notify: Reload crowdsec

    - name: Enroll CAPI (CrowdSec console)
      ansible.builtin.command: cscli console enroll {{ crowdsec_capi_enroll_key }}
      when:
        - crowdsec_capi_enabled | bool
        - crowdsec_capi_enroll_key | length > 0
      register: crowdsec_capi_enroll
      changed_when: "'already enrolled' not in crowdsec_capi_enroll.stdout | default('')"

    - name: Enable CAPI
      ansible.builtin.command: cscli console enable
      when: crowdsec_capi_enabled | bool
      register: crowdsec_capi_enable
      changed_when: crowdsec_capi_enable.rc == 0

    - name: Configure whitelist IPs
      ansible.builtin.command: cscli decisions add --ip {{ item }} --type whitelist --duration 99999h
      loop: "{{ crowdsec_whitelist_ips }}"
      when: crowdsec_whitelist_ips | length > 0
      register: crowdsec_whitelist_add
      changed_when: "'already exists' not in crowdsec_whitelist_add.stdout | default('')"

    - name: Start and enable CrowdSec
      ansible.builtin.systemd:
        name: crowdsec
        state: started
        enabled: true

    - name: Start and enable Firewall Bouncer
      ansible.builtin.systemd:
        name: crowdsec-firewall-bouncer
        state: started
        enabled: true
