---
# Nginx Stack - 模組化任務文件
# 按順序執行各個服務的安裝與配置

# 1. 首先安裝並配置 Nginx
- name: Import Nginx tasks
  ansible.builtin.import_tasks: nginx.yml
  tags: nginx

# 2. 申請並配置 SSL 憑證
- name: Import Certbot tasks
  ansible.builtin.import_tasks: certbot.yml
  tags: certbot
  when: certbot_enabled | bool

# 3. 安裝並配置 GoAccess
- name: Import GoAccess tasks
  ansible.builtin.import_tasks: goaccess.yml
  tags: goaccess

# 3.5. 安裝並配置 GeoIP
- name: Import GeoIP tasks
  ansible.builtin.import_tasks: geoip.yml
  tags: geoip
