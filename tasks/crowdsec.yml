---
# CrowdSec Security Engine - 最簡單配置
# 核心概念：行為分析 + 社群防禦
# Agent 讀取 Nginx 日誌分析惡意行為，Bouncer 在網路層封鎖 IP

- name: Install CrowdSec Security Engine
  block:
    # 第一步：安裝 CrowdSec Security Engine
    - name: Download and install CrowdSec repository script
      ansible.builtin.get_url:
        url: https://install.crowdsec.net
        dest: /tmp/install-crowdsec.sh
        mode: '0755'

    - name: Execute CrowdSec installation script
      ansible.builtin.command: bash /tmp/install-crowdsec.sh
      args:
        creates: /etc/crowdsec/config.yaml

    - name: Install crowdsec package
      ansible.builtin.package:
        name: crowdsec
        state: present

    # 第二步：安裝 Nginx Collection
    - name: Install CrowdSec Nginx collection
      ansible.builtin.command: cscli collections install crowdsecurity/nginx
      register: nginx_collection
      changed_when: "'already installed' not in nginx_collection.stderr"
      notify: Reload crowdsec

    # 第三步：安裝 Bouncer (防火牆執行者)
    - name: Install CrowdSec firewall bouncer (iptables)
      ansible.builtin.package:
        name: crowdsec-firewall-bouncer-iptables
        state: present

    # 配置 acquis.yaml 確保讀取 Nginx 日誌
    - name: Configure CrowdSec to read Nginx logs
      ansible.builtin.template:
        src: acquis.yaml.j2
        dest: /etc/crowdsec/acquis.yaml
        owner: root
        group: root
        mode: '0644'
      notify: Reload crowdsec

    # 確保服務啟動並啟用
    - name: Start and enable CrowdSec service
      ansible.builtin.systemd:
        name: crowdsec
        state: started
        enabled: true

    - name: Start and enable CrowdSec firewall bouncer
      ansible.builtin.systemd:
        name: crowdsec-firewall-bouncer
        state: started
        enabled: true

  rescue:
    - name: CrowdSec installation failed
      ansible.builtin.debug:
        msg: "CrowdSec installation encountered an error. Please check system logs."
