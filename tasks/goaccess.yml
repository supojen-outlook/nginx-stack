---
# GoAccess 安裝與配置

- name: 安裝 python3-passlib (htpasswd 模組需要)
  ansible.builtin.apt:
    name: python3-passlib
    state: present
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

- name: 下載 GoAccess GPG 金鑰 (Debian/Ubuntu)
  ansible.builtin.get_url:
    url: https://deb.goaccess.io/gnugpg.key
    dest: /usr/share/keyrings/goaccess.gpg
    mode: '0644'
    # 此金鑰是二進制格式，無需使用 'gpg --dearmor' 轉換
  when: ansible_facts['os_family'] == "Debian"

- name: 加入 GoAccess APT 來源 (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/goaccess.gpg] https://deb.goaccess.io/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == "Debian"

- name: 加入 GoAccess APT repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/goaccess.gpg] https://deb.goaccess.io/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    filename: goaccess
  when: ansible_facts['os_family'] == "Debian"

- name: 安裝 GoAccess (Debian/Ubuntu)
  ansible.builtin.apt:
    name: goaccess
    state: present
    update_cache: true
    lock_timeout: 300
  when: ansible_facts['os_family'] == "Debian"

- name: 安裝 EPEL (Red Hat/CentOS)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: 安裝 GoAccess (Red Hat/CentOS)
  ansible.builtin.dnf:
    name: goaccess
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: 建立 GoAccess 統計頁面目錄
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: 建立 Nginx htpasswd 檔案
  community.general.htpasswd:
    path: /etc/nginx/.htpasswd
    name: "{{ goaccess_admin_user }}"
    password: "{{ goaccess_admin_password }}"
    owner: root
    group: www-data
    mode: '0640'

- name: 部署 GoAccess 啟動腳本
  ansible.builtin.template:
    src: goaccess-wrapper.sh.j2
    dest: /usr/local/bin/goaccess-wrapper.sh
    mode: '0755'

- name: 部署 GoAccess Systemd Service
  ansible.builtin.template:
    src: goaccess.service.j2
    dest: /etc/systemd/system/goaccess.service
    mode: '0644'

- name: 重新載入 Systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: 啟動並啟用 GoAccess
  ansible.builtin.systemd:
    name: goaccess
    state: started
    enabled: true
  notify: Reload nginx
