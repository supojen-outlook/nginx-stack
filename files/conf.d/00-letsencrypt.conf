# ~/docker-proxy/nginx/conf.d/00-letsencrypt.conf

# HTTP 验证服务器 - 处理所有域名的验证请求
# 这个 server block 必须在其他 server block 之前加载
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # Let's Encrypt 验证路径 - 最高优先级
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }
    
    # 其他所有 HTTP 请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}